<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw File Watch</title>
  <style>
    :root {
      /* Light mode — whiteboard palette */
      --bg: #ffffff;
      --panel: #fafafa;
      --panel-2: #f5f5f5;
      --line: #e0e0e0;
      --ink: #212121;
      --muted: #757575;
      --accent: #1976d2;
      --accent-2: #f57c00;
      --shadow: rgba(0, 0, 0, 0.08);
      --good: #388e3c;
      --input-bg: #ffffff;
      --input-text: #212121;
      --rope-shadow-width: 2px;
      --rope-shadow-offset: 4px;
      --rope-shadow-diagonal: 6px;
      --rope-gradient: repeating-linear-gradient(
        135deg,
        #ff4d4d 0 4px,
        #ff9800 4px 8px,
        #ffe14d 8px 12px,
        #2fd05b 12px 16px,
        #12dfff 16px 20px,
        #2f6cff 20px 24px,
        #ad3cff 24px 28px
      );
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        /* Dark mode — chalkboard palette */
        --bg: #1a1a1a;
        --panel: #242424;
        --panel-2: #2d2d2d;
        --line: #3d3d3d;
        --ink: #e8e8e8;
        --muted: #a0a0a0;
        --accent: #64b5f6;
        --accent-2: #ffb74d;
        --shadow: rgba(0, 0, 0, 0.3);
        --good: #81c784;
        --input-bg: #1e1e1e;
        --input-text: #e8e8e8;
      }

      :root:not([data-theme="light"]) body {
        background-image: 
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.02) 0px,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px,
            transparent 2px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.015) 0px,
            rgba(255, 255, 255, 0.015) 1px,
            transparent 1px,
            transparent 2px
          );
      }
    }

    [data-theme="dark"] {
      /* Explicit dark mode — chalkboard */
      --bg: #1a1a1a;
      --panel: #242424;
      --panel-2: #2d2d2d;
      --line: #3d3d3d;
      --ink: #e8e8e8;
      --muted: #a0a0a0;
      --accent: #64b5f6;
      --accent-2: #ffb74d;
      --shadow: rgba(0, 0, 0, 0.3);
      --good: #81c784;
      --input-bg: #1e1e1e;
      --input-text: #e8e8e8;
    }

    [data-theme="dark"] body {
      background-image: 
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 2px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 1px,
          transparent 2px
        );
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      background-color: var(--bg);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    a { color: inherit; }
    * { --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .panel,
    button,
    .btn {
      position: relative;
      isolation: isolate;
    }
    .panel::after,
    button::after,
    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--rope-gradient);
      transform: translate(var(--rope-shadow-offset), var(--rope-shadow-offset));
      clip-path: polygon(
        100% 0,
        100% 100%,
        0 100%,
        0 calc(100% - var(--rope-shadow-width)),
        calc(100% - var(--rope-shadow-diagonal)) calc(100% - var(--rope-shadow-width)),
        calc(100% - var(--rope-shadow-width)) calc(100% - var(--rope-shadow-diagonal)),
        calc(100% - var(--rope-shadow-width)) 0
      );
      filter: drop-shadow(0 8px 16px var(--shadow));
      pointer-events: none;
      z-index: -1;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), filter 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .shell {
      width: min(1460px, calc(100vw - 24px));
      margin: 12px auto;
      display: grid;
      gap: 12px;
      grid-template-columns: 300px minmax(320px, 1fr) minmax(380px, 1.2fr);
    }
    .mobile-nav {
      display: none;
      gap: 8px;
      padding: 4px 0 0;
    }
    .panel {
      --rope-shadow-width: 3px;
      --rope-shadow-offset: 4px;
      --rope-shadow-diagonal: 7px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 28px -18px var(--shadow);
      overflow: visible;
      min-height: 84dvh;
      display: flex;
      flex-direction: column;
      transition: var(--transition);
    }

    [data-theme="dark"] .panel {
      background-image: 
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 2px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 2px
        );
      background-color: var(--panel);
    }
    .panel.alt { 
      background: var(--panel-2);
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px -18px var(--shadow);
    }

    [data-theme="dark"] .panel.alt {
      background-image: 
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 2px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 2px
        );
      background-color: var(--panel-2);
    }
    .panel-body {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }
    .head {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { 
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .sub {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.5;
      font-weight: 500;
    }
    .toolbar {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button, .btn {
      --rope-shadow-width: 2px;
      --rope-shadow-offset: 4px;
      --rope-shadow-diagonal: 6px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      box-shadow: 0 8px 18px -16px var(--shadow);
    }

    button:hover:not(:disabled), .btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translate(-1px, -1px);
      box-shadow: 0 10px 20px -16px var(--shadow);
    }

    button:active:not(:disabled), .btn:active:not(:disabled) {
      opacity: 1;
      transform: translate(2px, 2px);
      box-shadow: 0 6px 14px -16px var(--shadow);
    }

    button:hover:not(:disabled)::after, .btn:hover:not(:disabled)::after {
      transform: translate(calc(var(--rope-shadow-offset) + 1px), calc(var(--rope-shadow-offset) + 1px));
      filter: drop-shadow(0 10px 18px var(--shadow));
    }

    button:active:not(:disabled)::after, .btn:active:not(:disabled)::after {
      transform: translate(calc(var(--rope-shadow-offset) - 3px), calc(var(--rope-shadow-offset) - 3px));
      filter: drop-shadow(0 6px 12px var(--shadow));
    }

    button.secondary, .btn.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button.secondary:hover, .btn.secondary:hover {
      background: var(--panel);
      border-color: var(--accent);
      color: var(--accent);
    }

    [data-theme="dark"] button.secondary:hover,
    [data-theme="dark"] .btn.secondary:hover {
      background: var(--panel);
    }

    input[type="text"], textarea, input[type="file"] {
      background: var(--input-bg);
      color: var(--input-text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 14px;
      transition: var(--transition);
    }

    input[type="text"]::placeholder, textarea::placeholder {
      color: var(--muted);
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
    }
    button.secondary, .btn.secondary {
      background: #f1e4d2;
      color: var(--ink);
      border-color: var(--line);
    }
    .mobile-nav button {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      transition: var(--transition);
    }

    .mobile-nav button:hover {
      background: var(--panel-2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .mobile-nav button.is-active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .section {
      padding: 14px 18px 0;
    }
    .list {
      display: grid;
      gap: 10px;
      padding: 0 18px 18px;
      overflow: auto;
    }
    .card, .row {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: transparent;
      transition: var(--transition);
    }

    .card {
      padding: 12px;
      cursor: pointer;
    }
    
    .card:hover {
      border-color: var(--accent);
      background: var(--panel-2);
    }

    .card.active {
      border-color: var(--accent);
      background: var(--panel-2);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .card .label {
      font-size: 17px;
      font-weight: 700;
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }
    .row {
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }
    .row {
      padding: 10px 12px;
    }

    .row:hover {
      border-color: var(--accent);
      background: var(--panel-2);
    }

    .row .title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      font-size: 15px;
      font-weight: 600;
    }
    .row .path {
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 4px;
      padding: 4px 8px;
      background: var(--accent);
      color: #ffffff;
      font-size: 11px;
      font-weight: 600;
      width: fit-content;
      border: none;
    }
    .crumbs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .crumb {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      color: var(--ink);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition);
    }

    .crumb:hover {
      background: var(--panel-2);
      border-color: var(--accent);
    }

    .tree {
      padding: 0 18px 18px;
      overflow: auto;
    }
    .entry {
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: var(--transition);
    }
    .entry:last-child { 
      border-bottom: none;
    }
    .entry:hover { 
      background: var(--panel-2);
    }
    .entry .name {
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }
    .entry .detail {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .folder::before { content: "DIR"; color: var(--accent); margin-right: 8px; font-size: 11px; }
    .file::before { content: "FILE"; color: var(--accent-2); margin-right: 8px; font-size: 11px; }
    .preview {
      padding: 18px;
      overflow: auto;
      flex: 1;
    }
    .preview-block {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }
    .preview-meta {
      color: var(--muted);
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    pre {
      margin: 16px 0 0;
      padding: 12px;
      border-radius: 6px;
      background: #f5f5f5;
      color: #212121;
      border: 1px solid var(--line);
      overflow: auto;
      line-height: 1.45;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    [data-theme="dark"] pre {
      background: #1e1e1e;
      color: #e8e8e8;
    }

    img {
      width: 100%;
      border-radius: 6px;
      border: 1px solid var(--line);
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 18px;
    }
    .status {
      padding: 10px 18px 18px;
      color: var(--good);
      font-size: 13px;
    }
    /* --- New .md modal --- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(31,42,48,0.62);
      backdrop-filter: blur(2px);
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 12px;
      overflow-y: auto;
      transition: background 0.3s ease;
    }

    [data-theme="dark"] .modal-overlay,
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .modal-overlay {
        background: rgba(0,0,0,0.7);
      }
    }
    .modal-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 40px var(--shadow);
      width: min(640px, 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-top: 40px;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }
    .modal-head h2 { font-size: 1.1rem; }
    .modal-close {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: var(--transition);
    }
    .modal-close:hover { 
      background: var(--panel-2);
      color: var(--ink);
    }

    .modal-body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
    }
    .modal-body label {
      font-size: 0.8rem; color: var(--muted);
      margin-bottom: 6px; display: block;
    }
    .modal-body label + label { margin-top: 12px; }
    .modal-body input, .modal-body textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--line);
      color: var(--input-text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .modal-body input:focus, .modal-body textarea:focus { 
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 213, 208, 0.1);
    }
    .modal-body textarea {
      height: 50vh;
      resize: vertical;
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 0.82rem;
    }
    .modal-foot {
      padding: 14px 18px; display: flex; gap: 10px;
      border-top: 1px solid var(--line);
    }
    #mdStatus { margin-top: 8px; font-size: 0.83rem; min-height: 18px; }
    #mdStatus.ok { color: var(--good); }
    #mdStatus.err { color: #b83232; }

    /* --- File edit mode --- */
    .edit-controls { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .preview-edit-name {
      width: 100%; background: rgba(255,255,255,0.72);
      border: 1px solid var(--line); color: var(--ink); border-radius: 10px;
      padding: 8px 10px; font-size: 0.9rem; font-family: inherit; outline: none;
      margin: 10px 0 8px;
    }
    .preview-edit-name:focus { border-color: var(--accent); }
    .preview-edit-area {
      width: 100%; background: #1d2529; color: #f6f4ef;
      border: none; border-radius: 16px; padding: 16px;
      font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; line-height: 1.45;
      resize: vertical; min-height: 42vh; outline: none; box-sizing: border-box;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    #editStatus { margin-top: 8px; font-size: 0.83rem; min-height: 18px; }
    #editStatus.ok { color: var(--good); }
    #editStatus.err { color: #b83232; }

    @media (max-width: 1180px) {
      .shell { grid-template-columns: 280px 1fr; }
      .panel.preview-panel { grid-column: 1 / -1; min-height: 52dvh; }
    }
    @media (max-width: 780px) {
      body { padding-bottom: 18px; }
      .shell {
        grid-template-columns: 1fr;
        width: min(100vw - 16px, 760px);
        margin: 8px auto;
      }
      .mobile-nav {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        position: sticky;
        top: 8px;
        z-index: 5;
      }
      .panel {
        min-height: auto;
        border-radius: 16px;
      }
      .head {
        padding: 16px 16px 12px;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      button, .btn {
        text-align: center;
        justify-content: center;
      }
      .list, .tree, .preview {
        padding-left: 14px;
        padding-right: 14px;
      }
      .section {
        padding-left: 14px;
        padding-right: 14px;
      }
      .entry {
        grid-template-columns: 1fr;
      }
      .row .title {
        align-items: flex-start;
        flex-direction: column;
      }
      .crumbs {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 4px;
      }
      .crumb {
        white-space: nowrap;
      }
      body[data-mobile-panel="roots"] .panel.browse-panel,
      body[data-mobile-panel="roots"] .panel.preview-panel,
      body[data-mobile-panel="browse"] .panel.roots-panel,
      body[data-mobile-panel="browse"] .panel.preview-panel,
      body[data-mobile-panel="recent"] .panel.roots-panel,
      body[data-mobile-panel="recent"] .panel.browse-panel,
      body[data-mobile-panel="preview"] .panel.roots-panel,
      body[data-mobile-panel="preview"] .panel.browse-panel {
        display: none;
      }
      body[data-mobile-panel="recent"] #previewBlock,
      body[data-mobile-panel="preview"] #recentBlock {
        display: none;
      }
      body[data-mobile-panel="recent"] .panel.preview-panel,
      body[data-mobile-panel="preview"] .panel.preview-panel {
        display: flex;
      }
    }
  </style>
</head>
<body data-mobile-panel="roots">
  <main class="shell">
    <div class="mobile-nav" id="mobileNav">
      <button type="button" data-panel="roots" class="is-active">Roots</button>
      <button type="button" data-panel="browse">Browse</button>
      <button type="button" data-panel="recent">Recent</button>
      <button type="button" data-panel="preview">Preview</button>
    </div>

    <section class="panel alt roots-panel">
      <div class="head">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
          <h1 style="margin:0;">File Watch</h1>
          <button id="themeToggleBtn" type="button" class="secondary" title="Toggle dark mode" style="padding:8px 12px; font-size:16px; border-radius:8px;">🌙</button>
        </div>
        <p class="sub">Read-only browser for the OpenClaw core state and Lil Mike outputs.</p>
        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="🔍 Search files..." style="flex:1;" />
          <button id="refreshAllBtn" type="button">Refresh feed</button>
        </div>
      </div>
      <div class="panel-body">
        <div id="searchResults" style="display:none;">
          <div class="section"><h2>Search Results</h2><button type="button" id="clearSearchBtn" style="float:right; margin-top:-28px;">✕ Clear</button></div>
          <div id="searchResultsList" class="list"></div>
        </div>
        <div id="browseFeed">
          <div class="section"><h2>Watch Roots</h2></div>
          <div id="roots" class="list"></div>
          <div class="section"><h2>Favorites</h2></div>
          <div id="favorites" class="list"></div>
        </div>
      </div>
    </section>

    <section class="panel browse-panel">
      <div class="head">
        <h2 id="treeTitle">Directory</h2>
        <div id="crumbs" class="crumbs"></div>
        <div class="toolbar" style="margin-top:12px;">
          <label class="btn" style="cursor:pointer;">
            ⬆ Upload file
            <input type="file" id="uploadInput" style="display:none" multiple />
          </label>
          <button type="button" id="newMdBtn">📝 New .md file</button>
          <span id="uploadStatus" style="font-size:13px;color:var(--muted);align-self:center;"></span>
        </div>
      </div>
      <div class="panel-body">
        <div id="tree" class="tree"></div>
        <div id="treeStatus" class="status"></div>
      </div>
    </section>

    <section class="panel preview-panel">
      <div class="head">
        <h2>Recent changes and preview</h2>
        <p class="sub">Newest files first. Click any file to open a preview.</p>
      </div>
      <div class="panel-body">
        <div id="recentBlock">
          <div id="recent" class="list"></div>
        </div>
        <div id="previewBlock" class="preview-block">
          <div id="preview" class="preview">
            <div class="empty">Choose a file from the directory listing or the recent changes feed.</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- New .md file modal -->
  <div id="mdModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-head">
        <h2>📝 New .md File</h2>
        <button type="button" class="modal-close" id="mdModalClose">✕</button>
      </div>
      <div class="modal-body">
        <label for="mdFilename">Filename</label>
        <input id="mdFilename" type="text" placeholder="e.g. chatgpt-brainstorm.md" autocomplete="off" spellcheck="false" />
        <label for="mdContent">Content</label>
        <textarea id="mdContent" placeholder="Paste your text here…"></textarea>
        <div id="mdStatus"></div>
      </div>
      <div class="modal-foot">
        <button type="button" id="mdSaveBtn">Save File</button>
        <button type="button" class="secondary" id="mdCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // Initialize theme
    const savedTheme = localStorage.getItem("theme") || "auto";
    function applyTheme(theme) {
      if (theme === "auto") {
        document.documentElement.removeAttribute("data-theme");
      } else {
        document.documentElement.setAttribute("data-theme", theme);
      }
      localStorage.setItem("theme", theme);
      updateThemeToggleButton();
    }

    function updateThemeToggleButton() {
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      const isDark = document.documentElement.getAttribute("data-theme") === "dark" ||
                     (document.documentElement.getAttribute("data-theme") !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      themeToggleBtn.textContent = isDark ? "☀️" : "🌙";
    }

    applyTheme(savedTheme);

    const state = {
      roots: [],
      favorites: [],
      currentRoot: null,
      currentPath: "",
      mobilePanel: "roots",
    };

    const rootsEl = document.getElementById("roots");
    const favoritesEl = document.getElementById("favorites");
    const treeEl = document.getElementById("tree");
    const recentEl = document.getElementById("recent");
    const previewEl = document.getElementById("preview");
    const crumbsEl = document.getElementById("crumbs");
    const treeTitleEl = document.getElementById("treeTitle");
    const treeStatusEl = document.getElementById("treeStatus");
    const mobileNavEl = document.getElementById("mobileNav");

    function setMobilePanel(panel) {
      state.mobilePanel = panel;
      document.body.dataset.mobilePanel = panel;
      mobileNavEl.querySelectorAll("button").forEach(button => {
        button.classList.toggle("is-active", button.dataset.panel === panel);
      });
    }

    function esc(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function fmtBytes(num) {
      if (!num) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let value = num;
      let idx = 0;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx += 1;
      }
      return `${value.toFixed(value >= 10 || idx === 0 ? 0 : 1)} ${units[idx]}`;
    }

    async function loadRoots() {
      const res = await fetch("/api/files/roots", { cache: "no-store" });
      const data = await res.json();
      state.roots = data.roots || [];
      state.favorites = data.favorites || [];
      renderRoots();
      renderFavorites();
      if (!state.currentRoot && state.roots.length) {
        openDir(state.roots[0].id, "");
      }
    }

    function renderRoots() {
      rootsEl.innerHTML = state.roots.map(root => `
        <div class="card ${root.id === state.currentRoot ? "active" : ""}" data-root="${esc(root.id)}">
          <div class="label">${esc(root.label)}</div>
          <div class="meta">${esc(root.description)}</div>
          <div class="meta">${esc(root.path)}</div>
        </div>
      `).join("");
      rootsEl.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => {
          setMobilePanel("browse");
          openDir(card.dataset.root, "");
        });
      });
    }

    function renderFavorites() {
      favoritesEl.innerHTML = state.favorites.map(item => `
        <div class="row" data-root="${esc(item.root)}" data-path="${esc(item.path)}" data-kind="${esc(item.kind)}">
          <div class="title"><span>${esc(item.label)}</span><span class="badge">${esc(item.kind)}</span></div>
          <div class="path">${esc(item.root)} / ${esc(item.path)}</div>
        </div>
      `).join("");
      favoritesEl.querySelectorAll(".row").forEach(row => {
        row.addEventListener("click", () => {
          if (row.dataset.kind === "dir") {
            setMobilePanel("browse");
            openDir(row.dataset.root, row.dataset.path);
          } else {
            setMobilePanel("preview");
            openFile(row.dataset.root, row.dataset.path);
          }
        });
      });
    }

    async function openDir(root, path) {
      const params = new URLSearchParams({ root, path });
      const res = await fetch(`/api/files/list?${params}`, { cache: "no-store" });
      const data = await res.json();
      if (!data.ok) {
        treeEl.innerHTML = `<div class="empty">${esc(data.message || "Failed to load directory.")}</div>`;
        return;
      }
      state.currentRoot = root;
      state.currentPath = path;
      renderRoots();
      renderCrumbs(root, path);
      treeTitleEl.textContent = data.absolute_path;
      treeStatusEl.textContent = `${data.entries.length} items`;

      const items = [];
      if (data.parent !== null && path) {
        items.push(`
          <div class="entry" data-root="${esc(root)}" data-path="${esc(data.parent)}" data-kind="dir">
            <div>
              <div class="name folder">..</div>
              <div class="detail">Up one level</div>
            </div>
          </div>
        `);
      }
      items.push(...data.entries.map(entry => `
        <div class="entry" data-root="${esc(root)}" data-path="${esc(entry.path)}" data-kind="${entry.is_dir ? "dir" : "file"}">
          <div>
            <div class="name ${entry.is_dir ? "folder" : "file"}">${esc(entry.name)}</div>
            <div class="detail">${entry.is_dir ? "Directory" : `${fmtBytes(entry.size)} • ${esc(entry.kind)}`} • ${esc(entry.mtime)}</div>
          </div>
          <div class="badge">${entry.is_dir ? "open" : "preview"}</div>
        </div>
      `));
      treeEl.innerHTML = items.join("") || `<div class="empty">Directory is empty.</div>`;
      treeEl.querySelectorAll(".entry").forEach(entry => {
        entry.addEventListener("click", () => {
          if (entry.dataset.kind === "dir") {
            setMobilePanel("browse");
            openDir(entry.dataset.root, entry.dataset.path);
          } else {
            setMobilePanel("preview");
            openFile(entry.dataset.root, entry.dataset.path);
          }
        });
      });
    }

    function renderCrumbs(root, path) {
      const bits = path ? path.split("/") : [];
      const crumbs = [{ label: root, path: "" }];
      let current = "";
      for (const bit of bits) {
        current = current ? `${current}/${bit}` : bit;
        crumbs.push({ label: bit, path: current });
      }
      crumbsEl.innerHTML = crumbs.map(crumb => `
        <button class="crumb" data-root="${esc(root)}" data-path="${esc(crumb.path)}" type="button">${esc(crumb.label)}</button>
      `).join("");
      crumbsEl.querySelectorAll(".crumb").forEach(crumb => {
        crumb.addEventListener("click", () => openDir(crumb.dataset.root, crumb.dataset.path));
      });
    }

    // Current file state for edit mode
    const cf = { root: null, path: null, name: null, content: null, truncated: false, kind: null, rawUrl: null };

    function renderPreviewView() {
      let body = "";
      if (cf.kind === "image" && cf.rawUrl) {
        body = `<img src="${esc(cf.rawUrl)}" alt="${esc(cf.name)}" />`;
      } else {
        body = `<pre>${esc(cf.content || "")}</pre>`;
      }
      const truncWarn = cf.truncated ? `<div class="badge" style="margin-bottom:8px;">preview truncated — full file loaded on edit</div>` : "";
      const editBtn = (cf.kind === "text") ? `<button type="button" id="editFileBtn" style="margin-top:10px;">✏️ Edit</button>` : "";
      previewEl.innerHTML = `
        <h3>${esc(cf.name)}</h3>
        <div class="preview-meta">${esc(cf.path)}</div>
        <div class="preview-meta">${fmtBytes(cf.size || 0)} • ${esc(cf.kind)} • ${esc(cf.mtime || "")}</div>
        ${editBtn}
        ${truncWarn}
        ${body}
      `;
      const editBtn2 = document.getElementById("editFileBtn");
      if (editBtn2) editBtn2.addEventListener("click", enterEditMode);
    }

    async function enterEditMode() {
      // If truncated, fetch full content first
      let content = cf.content || "";
      if (cf.truncated) {
        const params = new URLSearchParams({ root: cf.root, path: cf.path, full: "1" });
        const res = await fetch(`/api/files/file?${params}`, { cache: "no-store" });
        const data = await res.json();
        if (data.ok) content = data.preview || "";
      }
      previewEl.innerHTML = `
        <h3>✏️ Editing: <span id="editDisplayName">${esc(cf.name)}</span></h3>
        <div class="preview-meta">${esc(cf.path)}</div>
        <label style="font-size:0.8rem;color:var(--muted);margin-top:10px;display:block;">Filename</label>
        <input class="preview-edit-name" id="editFilename" type="text" value="${esc(cf.name)}" spellcheck="false" autocomplete="off" />
        <label style="font-size:0.8rem;color:var(--muted);display:block;">Content</label>
        <textarea class="preview-edit-area" id="editContent">${esc(content)}</textarea>
        <div id="editStatus"></div>
        <div class="edit-controls">
          <button type="button" id="editSaveBtn">💾 Save</button>
          <button type="button" class="secondary" id="editCancelBtn">Cancel</button>
        </div>
      `;
      document.getElementById("editCancelBtn").addEventListener("click", renderPreviewView);
      document.getElementById("editSaveBtn").addEventListener("click", async () => {
        const newName = document.getElementById("editFilename").value.trim();
        const newContent = document.getElementById("editContent").value;
        const statusEl = document.getElementById("editStatus");
        const saveBtn = document.getElementById("editSaveBtn");
        if (!newName) { statusEl.className = "err"; statusEl.textContent = "Filename can't be empty."; return; }
        saveBtn.disabled = true;
        statusEl.className = "";
        statusEl.textContent = "Saving…";
        try {
          const res = await fetch("/api/files/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              root: cf.root,
              path: cf.path,
              content: newContent,
              new_filename: newName !== cf.name ? newName : null,
            }),
          });
          const j = await res.json();
          if (j.ok) {
            // Update cf state with new values
            cf.name = j.filename;
            cf.path = j.path;
            cf.content = newContent;
            cf.truncated = false;
            cf.size = j.size;
            statusEl.className = "ok";
            statusEl.textContent = "✅ Saved";
            setTimeout(() => {
              renderPreviewView();
              openDir(cf.root, cf.path.includes("/") ? cf.path.slice(0, cf.path.lastIndexOf("/")) : "");
              loadRecent();
            }, 800);
          } else {
            statusEl.className = "err";
            statusEl.textContent = "❌ " + j.message;
            saveBtn.disabled = false;
          }
        } catch (e) {
          statusEl.className = "err";
          statusEl.textContent = "❌ " + e.message;
          saveBtn.disabled = false;
        }
      });
    }

    async function openFile(root, path) {
      const params = new URLSearchParams({ root, path });
      const res = await fetch(`/api/files/file?${params}`, { cache: "no-store" });
      const data = await res.json();
      if (!data.ok) {
        previewEl.innerHTML = `<div class="empty">${esc(data.message || "Failed to load file.")}</div>`;
        return;
      }
      cf.root = root;
      cf.path = data.path;
      cf.name = data.name;
      cf.content = data.preview || null;
      cf.truncated = !!data.truncated;
      cf.kind = data.kind;
      cf.size = data.size;
      cf.mtime = data.mtime;
      cf.rawUrl = data.raw_url || null;
      renderPreviewView();
      setMobilePanel("preview");
      openDir(root, path.includes("/") ? path.slice(0, path.lastIndexOf("/")) : "");
    }

    async function loadRecent() {
      const res = await fetch("/api/files/recent?limit=30", { cache: "no-store" });
      const data = await res.json();
      const items = data.items || [];
      recentEl.innerHTML = items.map(item => `
        <div class="row" data-root="${esc(item.root)}" data-path="${esc(item.path)}">
          <div class="title"><span>${esc(item.path.split("/").pop())}</span><span class="badge">${esc(item.label)}</span></div>
          <div class="path">${esc(item.absolute_path)}</div>
          <div class="path">${esc(item.mtime)} • ${fmtBytes(item.size)}</div>
        </div>
      `).join("") || `<div class="empty">No recent files found.</div>`;
      recentEl.querySelectorAll(".row").forEach(row => {
        row.addEventListener("click", () => {
          setMobilePanel("preview");
          openFile(row.dataset.root, row.dataset.path);
        });
      });
    }

    async function refreshAll() {
      await Promise.all([loadRoots(), loadRecent()]);
    }

    async function performSearch(query) {
      if (!query.trim()) {
        clearSearch();
        return;
      }
      const params = new URLSearchParams({ q: query });
      const res = await fetch(`/api/files/search?${params}`, { cache: "no-store" });
      const data = await res.json();
      
      const searchResultsEl = document.getElementById("searchResults");
      const searchResultsList = document.getElementById("searchResultsList");
      const browseFeed = document.getElementById("browseFeed");
      
      if (data.ok && data.results.length) {
        browseFeed.style.display = "none";
        searchResultsEl.style.display = "block";
        searchResultsList.innerHTML = data.results.map(item => `
          <div class="row" data-root="${esc(item.root)}" data-path="${esc(item.path)}">
            <div class="title"><span>${esc(item.name)}</span><span class="badge">${esc(item.root)}</span></div>
            <div class="path">${esc(item.path)}</div>
            <div class="path">${fmtBytes(item.size)}</div>
          </div>
        `).join("");
        searchResultsList.querySelectorAll(".row").forEach(row => {
          row.addEventListener("click", () => {
            setMobilePanel("preview");
            openFile(row.dataset.root, row.dataset.path);
          });
        });
      } else {
        searchResultsEl.style.display = "block";
        browseFeed.style.display = "none";
        searchResultsList.innerHTML = `<div class="empty">No files found for "${esc(query)}".</div>`;
      }
    }

    function clearSearch() {
      document.getElementById("searchInput").value = "";
      document.getElementById("searchResults").style.display = "none";
      document.getElementById("browseFeed").style.display = "block";
    }

    mobileNavEl.querySelectorAll("button").forEach(button => {
      button.addEventListener("click", () => setMobilePanel(button.dataset.panel));
    });
    document.getElementById("refreshAllBtn").addEventListener("click", refreshAll);

    document.getElementById("themeToggleBtn").addEventListener("click", () => {
      const current = localStorage.getItem("theme") || "auto";
      let next = current === "light" ? "dark" : current === "dark" ? "auto" : "light";
      applyTheme(next);
    });

    // Listen for system theme changes when in auto mode
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if ((localStorage.getItem("theme") || "auto") === "auto") {
        updateThemeToggleButton();
      }
    });

    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener("input", (e) => {
      if (e.target.value.length >= 2) {
        performSearch(e.target.value);
      } else if (!e.target.value) {
        clearSearch();
      }
    });
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Escape") clearSearch();
    });
    document.getElementById("clearSearchBtn").addEventListener("click", clearSearch);

    const uploadInput = document.getElementById("uploadInput");
    const uploadStatus = document.getElementById("uploadStatus");
    uploadInput.addEventListener("change", async () => {
      const files = Array.from(uploadInput.files);
      if (!files.length) return;
      if (!state.currentRoot) {
        uploadStatus.textContent = "Select a directory first.";
        return;
      }
      uploadStatus.textContent = `Uploading ${files.length} file(s)…`;
      let successCount = 0;
      const errors = [];
      for (const file of files) {
        const form = new FormData();
        form.append("root", state.currentRoot);
        form.append("path", state.currentPath);
        form.append("file", file, file.name);
        try {
          const res = await fetch("/api/files/upload", { method: "POST", body: form });
          const data = await res.json();
          if (data.ok) {
            successCount++;
          } else {
            errors.push(`${file.name}: ${data.message}`);
          }
        } catch {
          errors.push(`${file.name}: network error`);
        }
      }
      uploadInput.value = "";
      if (errors.length) {
        uploadStatus.textContent = `${successCount} uploaded, errors: ${errors.join("; ")}`;
      } else {
        uploadStatus.textContent = `✓ ${successCount} file(s) uploaded`;
        setTimeout(() => { uploadStatus.textContent = ""; }, 3000);
      }
      if (successCount > 0) {
        openDir(state.currentRoot, state.currentPath);
        loadRecent();
      }
    });

    // --- New .md file modal ---
    const mdModal = document.getElementById("mdModal");
    const mdFilenameEl = document.getElementById("mdFilename");
    const mdContentEl = document.getElementById("mdContent");
    const mdStatusEl = document.getElementById("mdStatus");
    const mdSaveBtn = document.getElementById("mdSaveBtn");

    function openMdModal() {
      mdStatusEl.textContent = "";
      mdStatusEl.className = "";
      mdModal.style.display = "flex";
      setTimeout(() => mdFilenameEl.focus(), 50);
    }
    function closeMdModal() { mdModal.style.display = "none"; }

    document.getElementById("newMdBtn").addEventListener("click", openMdModal);
    document.getElementById("mdModalClose").addEventListener("click", closeMdModal);
    document.getElementById("mdCancelBtn").addEventListener("click", closeMdModal);
    mdModal.addEventListener("click", (e) => { if (e.target === mdModal) closeMdModal(); });

    mdSaveBtn.addEventListener("click", async () => {
      const fname = mdFilenameEl.value.trim();
      const content = mdContentEl.value;
      if (!fname) { mdStatusEl.className = "err"; mdStatusEl.textContent = "Enter a filename."; return; }
      if (!content.trim()) { mdStatusEl.className = "err"; mdStatusEl.textContent = "Content is empty."; return; }
      mdSaveBtn.disabled = true;
      mdStatusEl.className = "";
      mdStatusEl.textContent = "Saving…";
      try {
        const res = await fetch("/api/files/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            root: state.currentRoot || "workspace",
            path: state.currentPath || "uploads",
            filename: fname,
            content,
          }),
        });
        const j = await res.json();
        if (j.ok) {
          mdStatusEl.className = "ok";
          mdStatusEl.textContent = "✅ Saved to " + j.path;
          mdContentEl.value = "";
          mdFilenameEl.value = "";
          setTimeout(closeMdModal, 1400);
          openDir(state.currentRoot || "workspace", state.currentPath || "uploads");
          loadRecent();
        } else {
          mdStatusEl.className = "err";
          mdStatusEl.textContent = "❌ " + j.message;
        }
      } catch (e) {
        mdStatusEl.className = "err";
        mdStatusEl.textContent = "❌ " + e.message;
      }
      mdSaveBtn.disabled = false;
    });

    refreshAll();
    setInterval(loadRecent, 20000);
  </script>
</body>
</html>
